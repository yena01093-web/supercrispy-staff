<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>슈퍼크리스피 근태관리</title>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
<!-- QR Code Generator -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<!-- QR Code Scanner -->
<script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>

<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --primary: #E85D04;
  --primary-dark: #C44F03;
  --primary-light: #FFF3E0;
  --success: #27AE60;
  --danger: #E74C3C;
  --warning: #F39C12;
  --text: #2C3E50;
  --text-light: #7F8C8D;
  --border: #E0E0E0;
  --bg: #F8F9FA;
  --card: #FFFFFF;
  --nav-h: 64px;
  --header-h: 56px;
}

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  max-width: 480px;
  margin: 0 auto;
}

/* Header */
.app-header {
  position: fixed; top: 0; left: 50%; transform: translateX(-50%);
  width: 100%; max-width: 480px; height: var(--header-h);
  background: var(--primary); color: white;
  display: flex; align-items: center; padding: 0 16px;
  z-index: 100; box-shadow: 0 2px 8px rgba(0,0,0,.2);
  gap: 8px;
}
.app-header h1 { font-size: 18px; font-weight: 700; }
.app-header small { font-size: 12px; opacity: .8; }

/* Main */
.main { margin-top: var(--header-h); margin-bottom: var(--nav-h); padding: 16px; }

/* Tabs */
.tab { display: none; }
.tab.active { display: block; }

/* Bottom nav */
.bottom-nav {
  position: fixed; bottom: 0; left: 50%; transform: translateX(-50%);
  width: 100%; max-width: 480px; height: var(--nav-h);
  background: white; border-top: 1px solid var(--border);
  display: flex; z-index: 100; box-shadow: 0 -2px 8px rgba(0,0,0,.1);
}
.nav-btn {
  flex: 1; display: flex; flex-direction: column; align-items: center;
  justify-content: center; border: none; background: none; cursor: pointer;
  padding: 8px 4px; color: var(--text-light); font-size: 10px; gap: 3px;
  transition: color .2s;
}
.nav-btn .icon { font-size: 22px; }
.nav-btn.active { color: var(--primary); }

/* Card */
.card {
  background: var(--card); border-radius: 12px; padding: 16px;
  margin-bottom: 12px; box-shadow: 0 1px 4px rgba(0,0,0,.08);
}
.card-title {
  font-size: 12px; font-weight: 700; color: var(--text-light);
  text-transform: uppercase; letter-spacing: .6px; margin-bottom: 12px;
}

/* Section title */
.sec-title { font-size: 18px; font-weight: 700; margin-bottom: 16px; }

/* Form */
.fg { margin-bottom: 12px; }
.fl { display: block; font-size: 13px; font-weight: 600; margin-bottom: 5px; }
.fi {
  width: 100%; padding: 10px 12px; border: 1.5px solid var(--border);
  border-radius: 8px; font-size: 15px; background: white; color: var(--text);
  transition: border-color .2s;
}
.fi:focus { outline: none; border-color: var(--primary); }

/* Buttons */
.btn {
  display: inline-flex; align-items: center; justify-content: center;
  gap: 5px; padding: 10px 16px; border-radius: 8px; font-size: 14px;
  font-weight: 600; border: none; cursor: pointer;
  transition: opacity .15s, transform .1s;
}
.btn:active { transform: scale(.97); }
.btn-primary { background: var(--primary); color: white; }
.btn-primary:hover { background: var(--primary-dark); }
.btn-success { background: var(--success); color: white; }
.btn-danger { background: var(--danger); color: white; }
.btn-outline { background: white; border: 1.5px solid var(--border); color: var(--text); }
.btn-full { width: 100%; }
.btn-sm { padding: 6px 10px; font-size: 12px; border-radius: 6px; }

/* Stats grid */
.stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 12px; }
.stat-card {
  background: var(--card); border-radius: 12px; padding: 16px;
  text-align: center; box-shadow: 0 1px 4px rgba(0,0,0,.08);
}
.stat-num { font-size: 32px; font-weight: 700; color: var(--primary); }
.stat-lbl { font-size: 12px; color: var(--text-light); margin-top: 3px; }

/* Badge */
.badge { display: inline-block; padding: 3px 8px; border-radius: 20px; font-size: 12px; font-weight: 600; }
.badge-in { background: #D5F5E3; color: var(--success); }
.badge-out { background: #F2F3F4; color: var(--text-light); }

/* Attendance item */
.att-item { padding: 12px 0; border-bottom: 1px solid var(--border); }
.att-item:last-child { border-bottom: none; }
.att-name { font-weight: 600; font-size: 15px; }
.att-times { font-size: 13px; color: var(--text-light); display: flex; gap: 10px; flex-wrap: wrap; margin-top: 3px; }

/* Employee item */
.emp-item { display: flex; align-items: center; justify-content: space-between; padding: 12px 0; border-bottom: 1px solid var(--border); }
.emp-item:last-child { border-bottom: none; }
.emp-name { font-weight: 600; font-size: 15px; }
.emp-rate { font-size: 13px; color: var(--text-light); margin-top: 2px; }
.emp-actions { display: flex; gap: 6px; flex-shrink: 0; }

/* QR scan result */
.scan-result {
  text-align: center; padding: 20px; border-radius: 12px; margin-bottom: 16px;
  animation: popIn .25s ease;
}
@keyframes popIn { from { transform: scale(.9); opacity: 0; } to { transform: scale(1); opacity: 1; } }
.scan-result.success { background: #D5F5E3; border: 2px solid var(--success); }
.scan-result.error { background: #FADBD8; border: 2px solid var(--danger); }
.scan-result .r-icon { font-size: 48px; margin-bottom: 6px; }
.scan-result .r-name { font-size: 22px; font-weight: 700; }
.scan-result .r-status { font-size: 14px; color: var(--text-light); margin-top: 4px; white-space: pre-line; }

/* QR Card */
.qr-card {
  background: white; border-radius: 16px; padding: 24px;
  margin-bottom: 16px; box-shadow: 0 2px 8px rgba(0,0,0,.1);
  display: flex; align-items: center; gap: 20px;
}
.qr-card-info h3 { font-size: 18px; font-weight: 700; }
.qr-card-info p { font-size: 14px; color: var(--text-light); margin-top: 4px; }
.qr-card-info .qr-id { font-size: 10px; color: #bbb; margin-top: 6px; }

/* Payroll */
.month-total {
  background: var(--primary-light); border-radius: 12px; padding: 18px;
  margin-bottom: 14px; text-align: center;
}
.month-total .mt-label { font-size: 13px; font-weight: 600; color: var(--primary); }
.month-total .mt-amount { font-size: 30px; font-weight: 700; color: var(--primary); margin-top: 4px; }
.month-total .mt-sub { font-size: 12px; color: var(--text-light); margin-top: 3px; }

.pay-row { padding: 14px 0; border-bottom: 1px solid var(--border); }
.pay-row:last-child { border-bottom: none; }
.pay-name { font-weight: 700; font-size: 15px; margin-bottom: 8px; }
.pay-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 4px 12px; }
.pay-item { font-size: 13px; color: var(--text-light); }
.pay-item b { color: var(--text); }
.pay-net { font-size: 16px; font-weight: 700; color: var(--primary); margin-top: 8px; }

/* Month selector */
.month-sel { display: flex; gap: 8px; margin-bottom: 16px; }
.month-sel select {
  flex: 1; padding: 10px 8px; border: 1.5px solid var(--border);
  border-radius: 8px; font-size: 14px; background: white; color: var(--text);
}

/* Toast */
.toast {
  position: fixed; bottom: calc(var(--nav-h) + 12px); left: 50%;
  transform: translateX(-50%); background: #2C3E50; color: white;
  padding: 11px 20px; border-radius: 8px; font-size: 14px; z-index: 999;
  white-space: nowrap; opacity: 0; transition: opacity .3s; pointer-events: none;
  box-shadow: 0 4px 12px rgba(0,0,0,.3);
}
.toast.show { opacity: 1; }

/* Modal */
.modal-overlay {
  display: none; position: fixed; inset: 0; background: rgba(0,0,0,.5);
  z-index: 200; align-items: flex-end; justify-content: center;
}
.modal-overlay.show { display: flex; }
.modal {
  background: white; border-radius: 20px 20px 0 0; padding: 24px;
  width: 100%; max-width: 480px;
}
.modal h2 { font-size: 18px; font-weight: 700; margin-bottom: 18px; }
.modal-actions { display: flex; gap: 8px; margin-top: 14px; }

/* Loading / empty */
.loading { text-align: center; padding: 32px; color: var(--text-light); }
.spinner {
  width: 28px; height: 28px; border: 3px solid var(--border);
  border-top-color: var(--primary); border-radius: 50%;
  animation: spin .7s linear infinite; margin: 0 auto 10px;
}
@keyframes spin { to { transform: rotate(360deg); } }
.empty { text-align: center; padding: 36px 16px; color: var(--text-light); }
.empty .ei { font-size: 44px; margin-bottom: 10px; }
.empty p { font-size: 14px; }

#qr-reader { border-radius: 12px; overflow: hidden; }
</style>
</head>
<body>

<header class="app-header">
  <h1>🍗 슈퍼크리스피</h1>
  <small>직원 근태관리</small>
</header>

<main class="main">

  <!-- 대시보드 -->
  <section id="tab-dashboard" class="tab active">
    <div class="stats-grid">
      <div class="stat-card">
        <div class="stat-num" id="s-working">-</div>
        <div class="stat-lbl">현재 근무중</div>
      </div>
      <div class="stat-card">
        <div class="stat-num" id="s-total">-</div>
        <div class="stat-lbl">전체 직원</div>
      </div>
    </div>

    <div class="card">
      <div class="card-title">오늘 출퇴근</div>
      <div id="today-list"><div class="loading"><div class="spinner"></div>불러오는 중...</div></div>
    </div>

    <div class="card">
      <div class="card-title">이번 달 요약</div>
      <div id="month-summary"><div class="loading"><div class="spinner"></div></div></div>
    </div>
  </section>

  <!-- 직원 관리 -->
  <section id="tab-employees" class="tab">
    <div class="sec-title">직원 관리</div>
    <div class="card">
      <div class="card-title">직원 추가</div>
      <div class="fg">
        <label class="fl">이름</label>
        <input type="text" id="emp-name" class="fi" placeholder="직원 이름">
      </div>
      <div class="fg">
        <label class="fl">시급 (원)</label>
        <input type="number" id="emp-rate" class="fi" placeholder="예: 10030" min="0">
      </div>
      <button class="btn btn-primary btn-full" onclick="addEmployee()">➕ 직원 추가</button>
    </div>
    <div class="card">
      <div class="card-title">직원 목록</div>
      <div id="emp-list"><div class="loading"><div class="spinner"></div></div></div>
    </div>
  </section>

  <!-- QR 스캔 -->
  <section id="tab-scan" class="tab">
    <div class="sec-title">QR 출퇴근 스캔</div>
    <div id="scan-result" style="display:none"></div>
    <div class="card" style="padding:0;overflow:hidden;">
      <div id="qr-reader"></div>
    </div>
    <div style="margin-top:12px;text-align:center;">
      <button class="btn btn-outline" onclick="toggleScanner()" id="scan-btn">📷 스캐너 시작</button>
    </div>
  </section>

  <!-- QR 카드 -->
  <section id="tab-qrcards" class="tab">
    <div class="sec-title">직원 QR 카드</div>
    <p style="font-size:13px;color:var(--text-light);margin-bottom:14px;">
      QR코드를 스캔하면 출/퇴근이 자동 기록됩니다.
    </p>
    <div id="qr-cards"></div>
  </section>

  <!-- 급여 내역 -->
  <section id="tab-payroll" class="tab">
    <div class="sec-title">급여 내역</div>
    <div class="month-sel">
      <select id="py-year"></select>
      <select id="py-month">
        <option value="1">1월</option><option value="2">2월</option>
        <option value="3">3월</option><option value="4">4월</option>
        <option value="5">5월</option><option value="6">6월</option>
        <option value="7">7월</option><option value="8">8월</option>
        <option value="9">9월</option><option value="10">10월</option>
        <option value="11">11월</option><option value="12">12월</option>
      </select>
      <button class="btn btn-primary btn-sm" onclick="loadPayroll()">조회</button>
    </div>
    <div id="payroll-content"></div>
  </section>

</main>

<nav class="bottom-nav">
  <button class="nav-btn active" onclick="showTab('dashboard')" id="nav-dashboard">
    <span class="icon">🏠</span><span>대시보드</span>
  </button>
  <button class="nav-btn" onclick="showTab('employees')" id="nav-employees">
    <span class="icon">👥</span><span>직원</span>
  </button>
  <button class="nav-btn" onclick="showTab('scan')" id="nav-scan">
    <span class="icon">📷</span><span>QR 스캔</span>
  </button>
  <button class="nav-btn" onclick="showTab('qrcards')" id="nav-qrcards">
    <span class="icon">🪪</span><span>QR 카드</span>
  </button>
  <button class="nav-btn" onclick="showTab('payroll')" id="nav-payroll">
    <span class="icon">💰</span><span>급여</span>
  </button>
</nav>

<div class="toast" id="toast"></div>

<!-- Edit Modal -->
<div class="modal-overlay" id="edit-modal" onclick="if(event.target===this)closeEditModal()">
  <div class="modal">
    <h2>직원 정보 수정</h2>
    <input type="hidden" id="edit-id">
    <div class="fg">
      <label class="fl">이름</label>
      <input type="text" id="edit-name" class="fi">
    </div>
    <div class="fg">
      <label class="fl">시급 (원)</label>
      <input type="number" id="edit-rate" class="fi" min="0">
    </div>
    <div class="modal-actions">
      <button class="btn btn-outline" style="flex:1" onclick="closeEditModal()">취소</button>
      <button class="btn btn-primary" style="flex:2" onclick="saveEdit()">저장</button>
    </div>
  </div>
</div>

<script>
// ================================================================
// FIREBASE CONFIG
// Firebase 콘솔 (console.firebase.google.com) > 프로젝트 설정 > 웹 앱
// 에서 아래 값을 복사해 붙여넣으세요.
// ================================================================
const FIREBASE_CONFIG = {
  apiKey:            "AIzaSyDeMCsRN9uzqYq4DXmDtI0jZF8ByXhU-do",
  authDomain:        "supercrispy-staff-9eefd.firebaseapp.com",
  projectId:         "supercrispy-staff-9eefd",
  storageBucket:     "supercrispy-staff-9eefd.firebasestorage.app",
  messagingSenderId: "633473709172",
  appId:             "1:633473709172:web:302ce3335dbe57f9e10d21"
};

const TAX_RATE  = 0.033;
const QR_PREFIX = "SCSTAFF:";

// ================================================================
// INIT
// ================================================================
firebase.initializeApp(FIREBASE_CONFIG);
const db = firebase.firestore();

let employees  = [];
let scannerObj = null;
let scanning   = false;
let lastScan   = 0;

document.addEventListener("DOMContentLoaded", async () => {
  initYearSelect();
  await refreshEmployees();
  renderDashboard();
});

function initYearSelect() {
  const y  = new Date().getFullYear();
  const el = document.getElementById("py-year");
  for (let i = y; i >= y - 2; i--) {
    const o = document.createElement("option");
    o.value = i; o.textContent = i + "년";
    el.appendChild(o);
  }
  document.getElementById("py-month").value = new Date().getMonth() + 1;
}

// ================================================================
// NAVIGATION
// ================================================================
function showTab(name) {
  document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
  document.querySelectorAll(".nav-btn").forEach(b => b.classList.remove("active"));
  document.getElementById("tab-" + name).classList.add("active");
  document.getElementById("nav-" + name).classList.add("active");

  if (name !== "scan" && scanning) stopScanner();
  if (name === "dashboard")  renderDashboard();
  if (name === "employees")  renderEmpList();
  if (name === "qrcards")    renderQRCards();
}

// ================================================================
// EMPLOYEES
// ================================================================
async function refreshEmployees() {
  const snap = await db.collection("employees").orderBy("name").get();
  employees  = snap.docs.map(d => ({ id: d.id, ...d.data() }));
}

function renderEmpList() {
  const el = document.getElementById("emp-list");
  if (!employees.length) {
    el.innerHTML = `<div class="empty"><div class="ei">👤</div><p>등록된 직원이 없습니다</p></div>`;
    return;
  }
  el.innerHTML = employees.map(e => `
    <div class="emp-item">
      <div>
        <div class="emp-name">${e.name}</div>
        <div class="emp-rate">시급 ${e.hourlyRate.toLocaleString()}원</div>
      </div>
      <div class="emp-actions">
        <button class="btn btn-outline btn-sm" data-id="${e.id}" onclick="openEdit(this.dataset.id)">수정</button>
        <button class="btn btn-danger btn-sm" data-id="${e.id}" data-name="${e.name.replace(/"/g,'&quot;')}" onclick="delEmployee(this.dataset.id,this.dataset.name)">삭제</button>
      </div>
    </div>`).join("");
}

async function addEmployee() {
  const name = document.getElementById("emp-name").value.trim();
  const rate = parseInt(document.getElementById("emp-rate").value);
  if (!name)         return toast("이름을 입력하세요");
  if (!rate || rate < 0) return toast("시급을 올바르게 입력하세요");

  await db.collection("employees").add({
    name, hourlyRate: rate,
    createdAt: firebase.firestore.FieldValue.serverTimestamp()
  });
  document.getElementById("emp-name").value = "";
  document.getElementById("emp-rate").value = "";
  await refreshEmployees();
  renderEmpList();
  renderQRCards();
  toast(`${name} 직원이 추가되었습니다`);
}

function openEdit(id) {
  const e = employees.find(x => x.id === id);
  if (!e) return;
  document.getElementById("edit-id").value   = e.id;
  document.getElementById("edit-name").value = e.name;
  document.getElementById("edit-rate").value = e.hourlyRate;
  document.getElementById("edit-modal").classList.add("show");
}
function closeEditModal() {
  document.getElementById("edit-modal").classList.remove("show");
}
async function saveEdit() {
  const id   = document.getElementById("edit-id").value;
  const name = document.getElementById("edit-name").value.trim();
  const rate = parseInt(document.getElementById("edit-rate").value);
  if (!name)  return toast("이름을 입력하세요");
  if (!rate || rate < 0) return toast("시급을 올바르게 입력하세요");
  await db.collection("employees").doc(id).update({ name, hourlyRate: rate });
  closeEditModal();
  await refreshEmployees();
  renderEmpList();
  toast("수정되었습니다");
}
async function delEmployee(id, name) {
  if (!confirm(`${name} 직원을 삭제하시겠습니까?\n(근무 기록은 유지됩니다)`)) return;
  try {
    await db.collection("employees").doc(id).delete();
    await refreshEmployees();
    renderEmpList();
    toast(`${name} 직원이 삭제되었습니다`);
  } catch (e) {
    toast("삭제 중 오류가 발생했습니다: " + e.message);
  }
}

// ================================================================
// QR SCANNER
// ================================================================
function toggleScanner() {
  scanning ? stopScanner() : startScanner();
}

function startScanner() {
  if (!scannerObj) scannerObj = new Html5Qrcode("qr-reader");
  scannerObj.start(
    { facingMode: "environment" },
    { fps: 10, qrbox: { width: 240, height: 240 } },
    onQRScan,
    () => {}
  ).then(() => {
    scanning = true;
    document.getElementById("scan-btn").textContent = "⏹ 스캐너 중지";
  }).catch(err => toast("카메라를 시작할 수 없습니다"));
}

function stopScanner() {
  if (scannerObj && scanning) {
    scannerObj.stop().then(() => {
      scanning = false;
      document.getElementById("scan-btn").textContent = "📷 스캐너 시작";
    });
  }
}

async function onQRScan(text) {
  const now = Date.now();
  if (now - lastScan < 3000) return;
  lastScan = now;

  if (!text.startsWith(QR_PREFIX)) {
    showScanResult("error", "❌", "인식 불가", "슈퍼크리스피 QR코드가 아닙니다");
    return;
  }
  const empId = text.slice(QR_PREFIX.length);
  const emp   = employees.find(e => e.id === empId);
  if (!emp) {
    showScanResult("error", "❓", "직원 없음", "등록되지 않은 직원입니다");
    return;
  }
  await processCheckInOut(emp);
}

async function processCheckInOut(emp) {
  const todayStr = fmtDate(new Date());

  // 오늘 해당 직원의 출근 기록 조회
  const snap = await db.collection("attendance")
    .where("employeeId", "==", emp.id)
    .where("date", "==", todayStr)
    .get();

  const records   = snap.docs.map(d => ({ id: d.id, ...d.data() }));
  const openRec   = records.find(r => r.checkOut === null);

  if (!openRec) {
    // ── 출근 ──
    await db.collection("attendance").add({
      employeeId:   emp.id,
      employeeName: emp.name,
      hourlyRate:   emp.hourlyRate,
      date:         todayStr,
      checkIn:      firebase.firestore.FieldValue.serverTimestamp(),
      checkOut:     null,
      workHours:    null,
      grossPay:     null,
      taxAmount:    null,
      netPay:       null
    });
    showScanResult("success", "✅", emp.name,
      `출근 완료 · ${fmtTime(new Date())}`);
    toast(`${emp.name} 출근 체크인`);
  } else {
    // ── 퇴근 ──
    const checkInDate  = openRec.checkIn?.toDate?.() || new Date();
    const checkOutDate = new Date();
    const workHours    = (checkOutDate - checkInDate) / 3600000;
    const grossPay     = Math.floor(workHours * emp.hourlyRate);
    const taxAmount    = Math.floor(grossPay * TAX_RATE);
    const netPay       = grossPay - taxAmount;

    await db.collection("attendance").doc(openRec.id).update({
      checkOut:  firebase.firestore.FieldValue.serverTimestamp(),
      workHours: Math.round(workHours * 100) / 100,
      grossPay,
      taxAmount,
      netPay
    });
    showScanResult("success", "👋", emp.name,
      `퇴근 완료 · ${fmtTime(checkOutDate)}\n근무시간: ${fmtHours(workHours)}\n실수령: ${netPay.toLocaleString()}원`);
    toast(`${emp.name} 퇴근 체크아웃`);
  }
}

function showScanResult(type, icon, name, status) {
  const el = document.getElementById("scan-result");
  el.style.display = "block";
  el.innerHTML = `
    <div class="scan-result ${type}">
      <div class="r-icon">${icon}</div>
      <div class="r-name">${name}</div>
      <div class="r-status">${status}</div>
    </div>`;
  setTimeout(() => { el.style.display = "none"; }, 4500);
}

// ================================================================
// QR CARDS
// ================================================================
function renderQRCards() {
  const container = document.getElementById("qr-cards");
  if (!employees.length) {
    container.innerHTML = `<div class="empty"><div class="ei">🪪</div><p>등록된 직원이 없습니다</p></div>`;
    return;
  }
  container.innerHTML = "";
  employees.forEach(emp => {
    const card = document.createElement("div");
    card.className = "qr-card";
    card.innerHTML = `
      <div id="qr-${emp.id}"></div>
      <div class="qr-card-info">
        <h3>${emp.name}</h3>
        <p>시급 ${emp.hourlyRate.toLocaleString()}원</p>
        <p class="qr-id">ID: ${emp.id}</p>
      </div>`;
    container.appendChild(card);
    new QRCode(document.getElementById("qr-" + emp.id), {
      text: QR_PREFIX + emp.id,
      width: 160, height: 160,
      colorDark: "#000000", colorLight: "#ffffff",
      correctLevel: QRCode.CorrectLevel.M
    });
  });
}

// ================================================================
// DASHBOARD
// ================================================================
async function renderDashboard() {
  document.getElementById("s-total").textContent = employees.length;
  const todayStr = fmtDate(new Date());

  const snap    = await db.collection("attendance").where("date", "==", todayStr).get();
  const records = snap.docs.map(d => ({ id: d.id, ...d.data() }));
  const working = records.filter(r => r.checkOut === null).length;
  document.getElementById("s-working").textContent = working;

  const list = document.getElementById("today-list");
  if (!records.length) {
    list.innerHTML = `<div class="empty" style="padding:20px"><div class="ei">📋</div><p>오늘 출퇴근 기록이 없습니다</p></div>`;
  } else {
    list.innerHTML = [...records]
      .sort((a, b) => (b.checkIn?.toDate?.() || 0) - (a.checkIn?.toDate?.() || 0))
      .map(r => {
        const inT  = r.checkIn?.toDate?.() ? fmtTime(r.checkIn.toDate()) : "-";
        const outT = r.checkOut?.toDate?.() ? fmtTime(r.checkOut.toDate()) : null;
        return `
          <div class="att-item">
            <div style="display:flex;justify-content:space-between;align-items:center">
              <div class="att-name">${r.employeeName}</div>
              ${outT
                ? `<span class="badge badge-out">퇴근 ${outT}</span>`
                : `<span class="badge badge-in">근무중</span>`}
            </div>
            <div class="att-times">
              <span>출근 ${inT}</span>
              ${outT ? `<span>퇴근 ${outT}</span>` : ""}
              ${r.workHours ? `<span>${fmtHours(r.workHours)}</span>` : ""}
            </div>
            ${r.netPay != null
              ? `<div style="font-size:13px;color:var(--primary);font-weight:600;margin-top:4px">실수령 ${r.netPay.toLocaleString()}원</div>`
              : ""}
          </div>`;
      }).join("");
  }

  // 이번 달 요약
  const now   = new Date();
  const start = `${now.getFullYear()}-${pad(now.getMonth() + 1)}-01`;
  const end   = `${now.getFullYear()}-${pad(now.getMonth() + 1)}-31`;
  const mSnap = await db.collection("attendance")
    .where("date", ">=", start).where("date", "<=", end).get();
  const completed   = mSnap.docs.map(d => d.data()).filter(r => r.checkOut !== null);
  const totalHours  = completed.reduce((s, r) => s + (r.workHours || 0), 0);
  const totalNet    = completed.reduce((s, r) => s + (r.netPay    || 0), 0);
  document.getElementById("month-summary").innerHTML = `
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
      <div style="text-align:center">
        <div style="font-size:22px;font-weight:700;color:var(--primary)">${fmtHours(totalHours)}</div>
        <div style="font-size:12px;color:var(--text-light)">이번 달 총 근무</div>
      </div>
      <div style="text-align:center">
        <div style="font-size:22px;font-weight:700;color:var(--primary)">${totalNet.toLocaleString()}원</div>
        <div style="font-size:12px;color:var(--text-light)">이번 달 총 급여</div>
      </div>
    </div>`;
}

// ================================================================
// PAYROLL
// ================================================================
async function loadPayroll() {
  const year  = parseInt(document.getElementById("py-year").value);
  const month = parseInt(document.getElementById("py-month").value);
  const el    = document.getElementById("payroll-content");
  el.innerHTML = `<div class="loading"><div class="spinner"></div>계산 중...</div>`;

  const start = `${year}-${pad(month)}-01`;
  const end   = `${year}-${pad(month)}-31`;

  const snap    = await db.collection("attendance")
    .where("date", ">=", start).where("date", "<=", end).get();
  const all       = snap.docs.map(d => ({ id: d.id, ...d.data() }));
  const completed = all.filter(r => r.checkOut !== null);

  if (!completed.length) {
    el.innerHTML = `<div class="empty"><div class="ei">📊</div><p>${year}년 ${month}월 급여 데이터가 없습니다</p></div>`;
    return;
  }

  // 직원별 집계
  const byEmp = {};
  completed.forEach(r => {
    if (!byEmp[r.employeeId]) {
      byEmp[r.employeeId] = { name: r.employeeName, hourlyRate: r.hourlyRate,
        days: 0, totalHours: 0, totalGross: 0, totalTax: 0, totalNet: 0 };
    }
    byEmp[r.employeeId].days++;
    byEmp[r.employeeId].totalHours += r.workHours  || 0;
    byEmp[r.employeeId].totalGross += r.grossPay   || 0;
    byEmp[r.employeeId].totalTax   += r.taxAmount  || 0;
    byEmp[r.employeeId].totalNet   += r.netPay     || 0;
  });

  const grandNet   = Object.values(byEmp).reduce((s, e) => s + e.totalNet,   0);
  const grandGross = Object.values(byEmp).reduce((s, e) => s + e.totalGross, 0);

  let html = `
    <div class="month-total">
      <div class="mt-label">${year}년 ${month}월 총 급여</div>
      <div class="mt-amount">${grandNet.toLocaleString()}원</div>
      <div class="mt-sub">세전 ${grandGross.toLocaleString()}원 · 3.3% 공제 후</div>
    </div>
    <div class="card">
      <div class="card-title">직원별 급여</div>
  `;

  Object.entries(byEmp).forEach(([, d]) => {
    html += `
      <div class="pay-row">
        <div class="pay-name">${d.name}</div>
        <div class="pay-grid">
          <div class="pay-item">근무일수: <b>${d.days}일</b></div>
          <div class="pay-item">총 시간: <b>${fmtHours(d.totalHours)}</b></div>
          <div class="pay-item">시급: <b>${(d.hourlyRate || 0).toLocaleString()}원</b></div>
          <div class="pay-item">세전: <b>${d.totalGross.toLocaleString()}원</b></div>
          <div class="pay-item">세금(3.3%): <b style="color:var(--danger)">-${d.totalTax.toLocaleString()}원</b></div>
        </div>
        <div class="pay-net">💵 실수령액: ${d.totalNet.toLocaleString()}원</div>
      </div>`;
  });

  html += `</div><div class="card"><div class="card-title">일별 상세 기록</div>`;

  completed
    .sort((a, b) => (a.date < b.date ? 1 : -1))
    .forEach(r => {
      const inT  = r.checkIn?.toDate?.()  ? fmtTime(r.checkIn.toDate())  : "-";
      const outT = r.checkOut?.toDate?.() ? fmtTime(r.checkOut.toDate()) : "-";
      html += `
        <div class="att-item">
          <div style="display:flex;justify-content:space-between;align-items:flex-start">
            <div>
              <div class="att-name">${r.employeeName}</div>
              <div class="att-times">
                <span>${r.date}</span>
                <span>${inT} ~ ${outT}</span>
              </div>
            </div>
            <div style="text-align:right">
              <div style="font-size:13px;font-weight:600">${fmtHours(r.workHours || 0)}</div>
              <div style="font-size:14px;color:var(--primary);font-weight:700">${(r.netPay || 0).toLocaleString()}원</div>
            </div>
          </div>
        </div>`;
    });

  html += "</div>";
  el.innerHTML = html;
}

// ================================================================
// UTILITIES
// ================================================================
function fmtDate(d) {
  return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;
}
function fmtTime(d) {
  return `${pad(d.getHours())}:${pad(d.getMinutes())}`;
}
function fmtHours(h) {
  const hrs = Math.floor(h);
  const min = Math.round((h - hrs) * 60);
  if (hrs === 0) return `${min}분`;
  if (min === 0) return `${hrs}시간`;
  return `${hrs}시간 ${min}분`;
}
function pad(n) { return String(n).padStart(2, "0"); }

let toastTimer;
function toast(msg) {
  const el = document.getElementById("toast");
  el.textContent = msg;
  el.classList.add("show");
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove("show"), 2600);
}
</script>
